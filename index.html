<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My MBTI Routine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 헤더 -->
  <header class="header">
    <h1>🧠 My MBTI Routine</h1>
    <p>MBTI로 오늘 하루를 설계해보세요</p>
  </header>

  <!-- 메인 -->
  <main class="container">

    <!-- 입력 영역 -->
    <section class="input-section">
      
      <div class="input-group">
        <label>MBTI 선택</label>
        <select id="mbti">
          <option value="">선택하세요</option>
          <option>INTJ</option><option>INTP</option>
          <option>ENTJ</option><option>ENTP</option>
          <option>INFJ</option><option>INFP</option>
          <option>ENFJ</option><option>ENFP</option>
          <option>ISTJ</option><option>ISFJ</option>
          <option>ESTJ</option><option>ESFJ</option>
          <option>ISTP</option><option>ISFP</option>
          <option>ESTP</option><option>ESFP</option>
        </select>
      </div>

      <div class="input-group">
        <label>루틴 스타일</label>
        <select id="style">
          <option value="balanced">기본</option>
          <option value="productive">🔥 생산적</option>
          <option value="relaxed">🌿 여유</option>
        </select>
      </div>

      <button id="generateBtn">✨ 루틴 생성하기</button>

    </section>

    <!-- 결과 영역 -->
    <section id="result" class="routine hidden"></section>

    <!-- 저장 버튼 -->
    <section class="action-section">
      <button id="saveBtn">💾 루틴 저장</button>
    </section>

  </main>

  <!-- 푸터 -->
  <footer class="footer">
    <p>© 2026 My MBTI Routine</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
